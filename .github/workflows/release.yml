name: release

# Собирает кросс-платформенные бинари и публикует релиз при пуше тега vX.Y.Z.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: windows, goarch: amd64, ext: .exe, archive: zip }
          - { goos: darwin, goarch: amd64, ext: "", archive: tar }
          - { goos: darwin, goarch: arm64, ext: "", archive: tar }
          - { goos: linux, goarch: amd64, ext: "", archive: tar }
          - { goos: linux, goarch: arm64, ext: "", archive: tar }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          BIN="rimuru-lp-client${{ matrix.ext }}"
          VER="${GITHUB_REF_NAME#v}"   # тег v5.0.1 -> 5.0.1 (в .инфо префикс v добавляется в формате)
          go build -trimpath -ldflags "-s -w -X rimuru_lp_client_go/lp.Version=${VER}" -o "$BIN" .
          NAME="rimuru-lp-client_${{ matrix.goos }}_${{ matrix.goarch }}"
          mkdir -p "$NAME"
          cp "$BIN" README.md "$NAME"/
          if [ "${{ matrix.archive }}" = "zip" ]; then
            zip -r "${NAME}.zip" "$NAME"
          else
            tar -czf "${NAME}.tar.gz" "$NAME"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            *.zip
            *.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Checksums
        run: cd dist && sha256sum * > checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
